<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio — Thrill Wave | Research-Driven Video Production</title>
    <meta
      name="description"
      content="Selected work from Thrill Wave. Research-driven video production for defense, government, healthcare, corporate, and entertainment organizations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="site-nav"></div>

    <!-- HERO -->
    <section class="port-hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <div class="hero-eyebrow mono">Selected Work</div>
        <h1 class="hero-h1">The <strong>proof.</strong></h1>
        <p class="hero-sub">
          Every project started with a SITREP. Research first. Story second.
          Camera third. Here's what came out the other side.
        </p>
      </div>
    </section>

    <!-- PORTFOLIO GRID -->
    <section style="border-top: 1px solid var(--border)">
      <!-- FILTERS -->
      <div class="port-filters" id="port-filters"></div>

      <!-- GRID -->
      <div class="port-grid" id="port-grid"></div>

      <div class="port-count" id="port-count"></div>
    </section>

    <!-- LIGHTBOX MODAL -->
    <div id="port-modal" class="port-modal-overlay" onclick="closePortModal()">
      <button class="port-modal-close" onclick="closePortModal()">&times;</button>
      <div class="port-modal-inner" onclick="event.stopPropagation()">
        <div class="port-modal-video">
          <iframe id="port-modal-iframe" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="port-modal-meta">
          <div class="port-modal-category" id="port-modal-cat"></div>
          <div class="port-modal-title" id="port-modal-title"></div>
          <div class="port-modal-desc" id="port-modal-desc"></div>
        </div>
      </div>
    </div>

    <div id="site-footer"></div>

    <script src="includes.js"></script>
    <script src="menu.js"></script>

    <script>
      (function () {
        var TAG_LABELS = {
          government: "Government", defense: "Defense", healthcare: "Healthcare",
          corporate: "Corporate", events: "Events", brand: "Brand", nonprofit: "Non-profit"
        };

        var projects = [
          { label: "ITCA — TEC Case Study", tag: "government", vimeoId: "1175739079", desc: "Three engagements. Three subjects. Pre-production intelligence that changed the creative direction each time.", title: "TEC Case Study — Reframed", category: "Government", client: "Inter Tribal Council of Arizona" },
          { label: "Relentless Beats — Decadence AZ 2025", tag: "events", youtubeId: "pDk121-TCto", desc: "Full event coverage and post-event brand film for Arizona's largest NYE music festival.", title: "Decadence AZ 2025", category: "Events & Entertainment", client: "Relentless Beats" },
          { label: "ITCA — Dear Mom", tag: "government", youtubeId: "QlP7wPaFcVU", desc: "Tribal mothers speaking direct to camera. No narration. No institutional framing. Enrollment increased.", title: "Dear Mom", category: "Government", client: "ITCA — WIC Nutrition" },
          { label: "MedAire — Digital Assessment Kit", tag: "defense", youtubeId: "ABYrJD7QISk", desc: "Global aviation safety and medical services. Digital assessment toolkit for airlines, medical teams, and government operators.", title: "Digital Assessment Kit", category: "Defense & Aerospace", client: "MedAire" },
          { label: "Boston Scientific — Rezum Water Vapor Therapy", tag: "healthcare", youtubeId: "ECfZ1gZtzlE", desc: "Product film for Rezum BPH treatment. Research-driven medical communication targeting urologists and patients.", title: "Rezum — Water Vapor Therapy", category: "Healthcare", client: "Boston Scientific" },
          { label: "Aura — Protect Yourself", tag: "corporate", youtubeId: "bKcCTsmtqP8", desc: "Consumer trust campaign. Audience research surfaced messaging angles competitors hadn't touched.", title: "Protect Yourself", category: "Corporate", client: "Aura Identity Protection" },
          { label: "Golf Digest — Bubba Watson", tag: "brand", youtubeId: "2g7dOnDKYZo", desc: "Branded film series with tour professional Bubba Watson. Distribution strategy built alongside production.", title: "What Would Bubba Watson Shoot?", category: "Brand & Media", client: "Golf Digest" },
          { label: "Uber — Pitch", tag: "brand", youtubeId: "CkdTvsQl144", desc: "VCs in Ubers with entrepreneurs pitching live. Experiential event film for Uber's startup ecosystem initiative.", title: "Pitch", category: "Brand & Media", client: "Uber" },
          { label: "UBS — Service Without Compromise", tag: "corporate", youtubeId: "Qd40htwEmJM", desc: "Executive visibility and investor relations film. Research-driven messaging framework.", title: "Service Without Compromise", category: "Corporate", client: "UBS" },
          { label: "Training Mask — Learn to Breathe", tag: "brand", youtubeId: "jduIrHZT0og", desc: "Product launch video with athlete integration. Built distribution plan before production wrapped.", title: "Learn to Breathe", category: "Brand & Media", client: "Training Mask" },
          { label: "Citgo — Premium Products", tag: "corporate", youtubeId: "JQEb45RgaK8", desc: "Brand film for one of America's largest energy companies. Positioned around quality and service commitment.", title: "Premium Products, Excellent Service", category: "Corporate", client: "Citgo" },
          { label: "Rumco — Build With Integrity", tag: "corporate", youtubeId: "CN1IN8xlTVg", desc: "Brand film for a construction company built on quality and integrity. Story-first approach to employer brand.", title: "Build With Integrity", category: "Corporate", client: "Rumco" },
          { label: "Rumco — Operational Excellence", tag: "corporate", youtubeId: "S6sgi9GN9PE", desc: "Internal corporate training film. Operational standards communicated through real team stories.", title: "Operational Excellence", category: "Corporate", client: "Rumco" },
          { label: "Ridgeline — Manage Your Risk", tag: "corporate", youtubeId: "Jqci51WSpO0", desc: "Financial advisory brand film. Research-driven positioning for risk management and investment returns.", title: "Manage Your Risk, Revolutionize Your Returns", category: "Corporate", client: "Ridgeline" },
          { label: "Payroc — Payments Simplified", tag: "corporate", youtubeId: "d_pofos5ZLs", desc: "Brand film for a payment processing company. Research-backed positioning around simplicity and service.", title: "Payments Simplified, For You", category: "Corporate", client: "Payroc" },
          { label: "Questage — Enduring Legacy", tag: "corporate", youtubeId: "oTBdp-MwnxA", desc: "Brand film for a financial and estate planning firm. Legacy and values positioned as the core differentiator.", title: "Enduring Legacy", category: "Corporate", client: "Questage" },
          { label: "Integrated Modular — Built to Last", tag: "corporate", youtubeId: "4bg9VjczCXg", desc: "Brand film for a modular construction company. Employer brand and quality positioning for a growing market.", title: "Built to Last", category: "Corporate", client: "Integrated Modular Solutions" },
          { label: "Nektar Therapeutics — Mike's Story", tag: "healthcare", youtubeId: "8BruwRwC9Tg", desc: "Patient story for a biopharma melanoma treatment. Real patient, real outcomes, documentary approach.", title: "Mike's Story — Melanoma Treatment", category: "Healthcare", client: "Nektar Therapeutics" },
          { label: "Andres Plastic Surgery — Your Body, High Standards", tag: "healthcare", youtubeId: "N3yfL_gk_vE", desc: "Aesthetic medicine brand film. Research identified what patients look for when choosing a plastic surgeon.", title: "Your Body, High Standards", category: "Healthcare", client: "Andres Plastic Surgery" },
          { label: "Aurelio PT — Fitness Forward", tag: "healthcare", youtubeId: "Ny-eNXzNrtA", desc: "Physical therapy brand film. Positioned around performance and athletic recovery for an active patient base.", title: "Fitness Forward Performance", category: "Healthcare", client: "Aurelio Physical Therapy" },
          { label: "Thrill Wave — Show Your Practice", tag: "healthcare", youtubeId: "EgloZ5_aPXs", desc: "Spec commercial for healthcare providers. Agnostic storytelling approach built for any specialty.", title: "Show Your Practice To The World", category: "Healthcare", client: "Thrill Wave" },
          { label: "Banner Health — David Johnson Mission 31", tag: "healthcare", youtubeId: "OspZP1gjJck", desc: "NFL player David Johnson donated to Banner Health Children's Hospital. Sports and community health storytelling.", title: "David Johnson's Mission 31", category: "Healthcare", client: "Banner Health Children's Hospital" },
          { label: "Music Celebrations Int'l — Ireland", tag: "events", youtubeId: "oXOPxKmigKA", desc: "Music travel experience documentary. Student musicians performing across Ireland.", title: "Ireland", category: "Events & Entertainment", client: "Music Celebrations International" },
          { label: "Wonderspaces — Immerse Yourself", tag: "events", youtubeId: "n26-IyiVLsw", desc: "Immersive art experience brand film. Documentary approach to capturing the visitor experience.", title: "Immerse Yourself", category: "Events & Entertainment", client: "Wonderspaces" },
          { label: "EXP Trips — Explore More", tag: "events", youtubeId: "mxQFKiYivmI", desc: "Student and teacher travel brand film. Documentary storytelling capturing transformative travel experiences.", title: "Explore More", category: "Events & Entertainment", client: "EXP Trips" },
          { label: "Walter Where?House — Spectrum", tag: "events", youtubeId: "AqF00b6gWVo", desc: "Event film for Walter Productions' immersive venue experience. Cinematic documentation of a one-night spectacle.", title: "Spectrum", category: "Events & Entertainment", client: "Walter Where?House" },
          { label: "Hypnotik — Pack It Up", tag: "brand", youtubeId: "WoFqn7U9tq4", desc: "Stop-motion branded content for an MMA apparel brand. Built around product storytelling and fighter culture.", title: "Pack It Up", category: "Brand & Media", client: "Hypnotik" },
          { label: "Kindred — Break the Mold", tag: "brand", youtubeId: "opb_FLe4_Xo", desc: "Cannabis brand film challenging category conventions. Audience research shaped the anti-establishment angle.", title: "Break the Mold", category: "Brand & Media", client: "Kindred" },
          { label: "Neighbor — Furniture for the Modern Home", tag: "brand", youtubeId: "ACgPMAyPQeI", desc: "Modern furniture brand film. Lifestyle-driven storytelling built around how people actually live.", title: "Furniture for the Modern Home", category: "Brand & Media", client: "Neighbor" },
          { label: "No-Stir Nut Butter — Don't Use Your Hands", tag: "brand", youtubeId: "Aeazq9lVRIw", desc: "Consumer product launch film. Clean, direct storytelling for a kitchen innovation.", title: "Don't Use Your Hands", category: "Brand & Media", client: "No-Stir Nut Butter Mixer" },
          { label: "PB Americano — In a Nutshell", tag: "brand", youtubeId: "nCmXrqVTkwA", desc: "Consumer food brand launch film. Playful, story-driven campaign for an American-made peanut butter product.", title: "In a Nutshell", category: "Brand & Media", client: "PB Americano" },
          { label: "Thrill Wave — Attention-Grabbing Content", tag: "brand", youtubeId: "2I-Jni1jEuQ", desc: "Spec commercial for branded content. Built to demonstrate high-production storytelling for brand campaigns.", title: "Need Attention-Grabbing Content?", category: "Brand & Media", client: "Thrill Wave" },
          { label: "Paradise Valley Preserve — Protect Our Land", tag: "nonprofit", youtubeId: "tkqnm36YAfM", desc: "Conservation awareness film for a land preservation trust. Documentary approach to environmental storytelling.", title: "Protect Our Land", category: "Non-profit", client: "Paradise Valley Mountain Preserve Trust" },
        ];

        var categories = [
          { label: "All Work", tag: "all" },
          { label: "Government", tag: "government" },
          { label: "Defense", tag: "defense" },
          { label: "Healthcare", tag: "healthcare" },
          { label: "Corporate", tag: "corporate" },
          { label: "Events", tag: "events" },
          { label: "Brand", tag: "brand" },
          { label: "Non-profit", tag: "nonprofit" },
        ];

        var activeFilter = "all";

        function buildFilters() {
          var el = document.getElementById("port-filters");
          categories.forEach(function (cat) {
            var btn = document.createElement("button");
            btn.className = "port-filter" + (cat.tag === "all" ? " active" : "");
            btn.textContent = cat.label;
            btn.setAttribute("data-tag", cat.tag);
            btn.onclick = function () {
              activeFilter = cat.tag;
              document.querySelectorAll(".port-filter").forEach(function (b) {
                b.classList.toggle("active", b.getAttribute("data-tag") === cat.tag);
              });
              buildGrid();
            };
            el.appendChild(btn);
          });
        }

        function buildGrid() {
          var el = document.getElementById("port-grid");
          el.innerHTML = "";
          var filtered = activeFilter === "all"
            ? projects
            : projects.filter(function (p) { return p.tag === activeFilter; });

          filtered.forEach(function (p, i) {
            var card = document.createElement("div");
            card.className = "port-card";
            card.style.opacity = "0";
            card.style.animation = "fadeUp 0.5s ease " + Math.min(i * 0.08, 0.6) + "s forwards";

            var hasVideo = !!(p.vimeoId || p.youtubeId);
            var thumbnail = p.vimeoId
              ? "https://vumbnail.com/" + p.vimeoId + ".jpg"
              : (p.youtubeId ? "https://img.youtube.com/vi/" + p.youtubeId + "/hqdefault.jpg" : null);

            var thumbInner = (hasVideo && thumbnail)
              ? '<div class="port-thumb-inner" style="background-image:url(' + thumbnail + ');background-size:cover;background-position:center;"></div>'
              : '<div class="port-thumb-inner"><span class="port-thumb-label">' + p.client + "</span></div>";

            var labelParts = p.label.split(" \u2014 ");
            var clientPart = labelParts[0] || p.label;
            var namePart = labelParts[1] || "";

            card.innerHTML =
              '<div class="port-thumb">' +
              thumbInner +
              '<div class="port-thumb-gradient"></div>' +
              '<div class="port-play"><div class="port-play-tri"></div></div>' +
              '<div class="port-info">' +
              '<div class="port-category">' + (TAG_LABELS[p.tag] || p.tag) + '</div>' +
              '<div class="port-title">' +
              '<span class="port-title-client">' + clientPart + '</span>' +
              (namePart ? '<span class="port-title-name">' + namePart + '</span>' : '') +
              '</div>' +
              '</div>' +
              "</div>";

            if (hasVideo) {
              var embedUrl = p.vimeoId
                ? "https://player.vimeo.com/video/" + p.vimeoId + "?autoplay=1&badge=0&autopause=0&player_id=0&app_id=58479"
                : "https://www.youtube.com/embed/" + p.youtubeId + "?autoplay=1";
              card.style.cursor = "pointer";
              (function(proj, url) {
                card.addEventListener("click", function() {
                  openPortModal(url, proj.title, proj.category, proj.desc);
                });
              })(p, embedUrl);
            }

            el.appendChild(card);
          });
        }

        buildFilters();
        buildGrid();

        window.openPortModal = function(embedUrl, title, category, desc) {
          document.getElementById("port-modal-iframe").src = embedUrl;
          document.getElementById("port-modal-cat").textContent = category;
          document.getElementById("port-modal-title").textContent = title;
          document.getElementById("port-modal-desc").textContent = desc;
          document.getElementById("port-modal").classList.add("active");
          document.body.style.overflow = "hidden";
        };

        window.closePortModal = function() {
          document.getElementById("port-modal-iframe").src = "";
          document.getElementById("port-modal").classList.remove("active");
          document.body.style.overflow = "";
        };

        document.addEventListener("keydown", function(e) {
          if (e.key === "Escape") window.closePortModal();
        });
      })();
    </script>
  </body>
</html>
